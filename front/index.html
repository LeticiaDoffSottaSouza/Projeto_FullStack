<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Acessórios</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Catálogo de Acessórios</h1>
        <button onclick="cadastro.classList.remove('oculto')">
            Adicionar Acessório
        </button>
    </header>

    <main></main>

    <div id="cadastro" class="modal oculto">
        <div class="janela">
            <h2>Adicionar Acessório</h2>
            <form id="formCad">
                <label>Nome do Acessório</label>
                <input type="text" id="nome" required>

                <label>Marca</label>
                <input type="text" id="marca" required>

                <label>Categoria</label>
                <select id="categoria">
                    <option value="COLAR">Colar</option>
                    <option value="PULSEIRA">Pulseira</option>
                    <option value="ANEL">Anel</option>
                    <option value="BRINCO">Brinco</option>
                    <option value="BOLSA">Bolsa</option>
                    <option value="RELOGIO">Relógio</option>
                    <option value="OUTRO">Outro</option>
                </select>

                <label>Preço R$</label>
                <input type="number" id="preco" step="0.01" required>

                <label>URL da imagem</label>
                <input type="text" id="imagem" required>

                <br><br>
                <button type="reset" onclick="cadastro.classList.add('oculto')">
                    Cancelar
                </button>
                <button type="submit">
                    Salvar
                </button>
            </form>
        </div>
    </div>

    <div id="detalhes" class="modal oculto">
        <div class="janela">
            <h2 id="tituloAcessorio"></h2>
            <img id="imgAcessorio">

            <p><b>Nome</b></p>
            <input type="text" id="nomeEdit">

            <p><b>Marca</b></p>
            <input type="text" id="marcaEdit">

            <p><b>Categoria</b></p>
            <select id="categoriaEdit">
                <option value="COLAR">Colar</option>
                <option value="PULSEIRA">Pulseira</option>
                <option value="ANEL">Anel</option>
                <option value="BRINCO">Brinco</option>
                <option value="BOLSA">Bolsa</option>
                <option value="RELOGIO">Relógio</option>
                <option value="OUTRO">Outro</option>
            </select>

            <p><b>Preço R$</b></p>
            <input type="number" id="precoEdit" step="0.01">

            <p><b>Imagem (URL)</b></p>
            <input type="text" id="imgEdit">

            <br><br>
            <button onclick="salvarEdicao()">Salvar</button>
            <button onclick="excluirAcessorioAtual()">Excluir</button>
            <button onclick="detalhes.classList.add('oculto')">
                Fechar
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
